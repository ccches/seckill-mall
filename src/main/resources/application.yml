spring:
  application:
    name: seckill-mall
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/seckill_db?characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:}  # 本地运行时在 application-local.yml 中配置
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

rocketmq:
  name-server: localhost:9876
  producer:
    group: seckill-producer

server:
  port: 8080
